name: reuse_sampa
description: >
  Reuse Sampa — aplicativo oficial para visualização e reserva de materiais
  reutilizáveis disponíveis nos Ecopontos da cidade de São Paulo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # --- Estado / Arquitetura ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  equatable: ^2.0.5

  # --- Firebase ---
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.1
  cloud_functions: ^5.0.1
  firebase_analytics: ^11.2.0

  # --- Autenticação social ---
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # --- Mapas e localização ---
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  url_launcher: ^6.3.0

  # --- Mídia ---
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  shimmer: ^3.0.0

  # --- UI / UX ---
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0+3
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  share_plus: ^9.0.0
  qr_code_scanner_plus: ^2.0.9
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.1
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Para adicionar as fontes da marca (opcional — hoje usamos google_fonts,
  # que baixa Poppins/Inter automaticamente). Caso quiram fontes locais,
  # descomentem e adicionem os arquivos em assets/fonts/.
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

flutter_native_splash:
  # NOTA: adicionar os arquivos de imagem abaixo em assets/images/ antes de
  # rodar `flutter pub run flutter_native_splash:create` — ver README.
  color: "#F2E9D8"
  image: assets/images/logo_reuse_sampa.png
  color_dark: "#1A3324"
  image_dark: assets/images/logo_reuse_sampa_dark.png

flutter_launcher_icons:
  # NOTA: idem — adicionar os arquivos antes de rodar
  # `flutter pub run flutter_launcher_icons`.
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#F2E9D8"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
