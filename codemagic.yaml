# Configuração pronta para gerar um .apk instalável a partir deste projeto.
#
# Como este projeto foi criado sem o Flutter SDK local, ele ainda não tem as
# pastas nativas android/ e ios/. O primeiro passo do workflow abaixo gera
# essas pastas automaticamente na máquina de build do Codemagic (comando
# `flutter create`), então roda normalmente `pub get` + `build apk`.
workflows:
  android-apk:
    name: Reuse Sampa - Build Android APK
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Gerar pastas nativas (android/ios/web) que faltam no projeto
        script: |
          flutter create --platforms=android,ios,web --org com.prefeiturasp .
      - name: Instalar dependências
        script: flutter pub get
      - name: Build APK (release, sem assinatura de Play Store)
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    # Dica: depois que o primeiro build funcionar, dá para adicionar
    # notificação por e-mail direto pela interface do Codemagic (aba
    # "Publishing" do workflow), sem precisar editar este arquivo.
